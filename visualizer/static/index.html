<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harness Visualizer</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-dark: #0f172a;
            --bg-panel: #1e293b;
            --bg-card: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border: #475569;
            --status-pending: #9ca3af;
            --status-running: #3b82f6;
            --status-success: #22c55e;
            --status-failed: #ef4444;
            --status-skipped: #f59e0b;
            --accent: #6366f1;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }
        
        /* Header */
        .header {
            height: 48px;
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }
        
        .header h1 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .header .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .header .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--status-pending);
        }
        
        .header .status-dot.connected {
            background: var(--status-success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* Main Layout */
        .main {
            display: flex;
            height: calc(100vh - 48px);
        }
        
        /* DAG Graph Panel */
        .graph-panel {
            flex: 1;
            position: relative;
            background: var(--bg-dark);
        }
        
        #dag-graph {
            width: 100%;
            height: 100%;
        }
        
        /* Sidebar */
        .sidebar {
            width: 380px;
            background: var(--bg-panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
        
        .stat-card {
            background: var(--bg-card);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
        }
        
        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
        }
        
        .stat-card .label {
            font-size: 10px;
            color: var(--text-secondary);
            text-transform: uppercase;
            margin-top: 2px;
        }
        
        .stat-card.total .value { color: var(--text-primary); }
        .stat-card.success .value { color: var(--status-success); }
        .stat-card.failed .value { color: var(--status-failed); }
        .stat-card.running .value { color: var(--status-running); }
        
        /* Tabs */
        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        
        .tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .tab:hover { color: var(--text-primary); }
        .tab.active {
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }
        
        /* Tab Content */
        .tab-content {
            flex: 1;
            overflow: hidden;
            display: none;
        }
        
        .tab-content.active { display: flex; flex-direction: column; }
        
        /* Event Log */
        .event-log {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 11px;
        }
        
        .event-item {
            padding: 6px 8px;
            margin-bottom: 4px;
            border-radius: 6px;
            background: var(--bg-card);
            border-left: 3px solid transparent;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .event-item.started { border-left-color: var(--status-running); }
        .event-item.completed { border-left-color: var(--status-success); }
        .event-item.failed { border-left-color: var(--status-failed); }
        .event-item.retrying { border-left-color: var(--status-skipped); }
        .event-item.skipped { border-left-color: var(--status-skipped); }
        
        .event-item .event-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2px;
        }
        
        .event-item .event-type {
            font-weight: 600;
            font-size: 10px;
            text-transform: uppercase;
        }
        
        .event-item .event-time {
            color: var(--text-secondary);
            font-size: 10px;
        }
        
        .event-item .event-node {
            color: var(--accent);
            font-weight: 600;
        }
        
        .event-item .event-details {
            color: var(--text-secondary);
            margin-top: 2px;
            word-break: break-all;
        }
        
        /* Sessions List */
        .sessions-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .session-item {
            padding: 10px;
            margin-bottom: 6px;
            background: var(--bg-card);
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .session-item:hover { background: var(--border); }
        
        .session-item .session-id {
            font-family: monospace;
            font-size: 11px;
            color: var(--accent);
        }
        
        .session-item .session-meta {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        /* Node Detail Panel */
        .node-detail {
            padding: 12px;
            overflow-y: auto;
        }
        
        .node-detail h3 {
            font-size: 14px;
            margin-bottom: 12px;
            color: var(--accent);
        }
        
        .node-detail .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
        }
        
        .node-detail .detail-label {
            color: var(--text-secondary);
        }
        
        .node-detail .detail-value {
            font-family: monospace;
        }
        
        /* Legend */
        .legend {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 11px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        
        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
            gap: 12px;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔧 Harness Visualizer</h1>
        <div class="status">
            <div class="status-dot" id="ws-status"></div>
            <span id="ws-status-text">Disconnected</span>
        </div>
        <div style="flex:1"></div>
        <div class="status" id="session-info" style="display:none">
            <span>Session:</span>
            <span id="session-id" style="font-family:monospace"></span>
        </div>
    </div>
    
    <div class="main">
        <div class="graph-panel">
            <div id="dag-graph"></div>
            <div id="graph-empty" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#64748b;font-size:14px;text-align:center;">
                <div style="font-size:32px;margin-bottom:8px;">📊</div>
                <div>Select a session from the sidebar<br>to view the DAG topology</div>
            </div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--status-pending)"></div>
                    <span>Pending</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--status-running)"></div>
                    <span>Running</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--status-success)"></div>
                    <span>Success</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--status-failed)"></div>
                    <span>Failed</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color" style="background: var(--status-skipped)"></div>
                    <span>Skipped</span>
                </div>
            </div>
        </div>
        
        <div class="sidebar">
            <div class="stats-bar">
                <div class="stat-card total">
                    <div class="value" id="stat-total">0</div>
                    <div class="label">Total</div>
                </div>
                <div class="stat-card success">
                    <div class="value" id="stat-success">0</div>
                    <div class="label">Success</div>
                </div>
                <div class="stat-card failed">
                    <div class="value" id="stat-failed">0</div>
                    <div class="label">Failed</div>
                </div>
                <div class="stat-card running">
                    <div class="value" id="stat-running">0</div>
                    <div class="label">Running</div>
                </div>
            </div>
            
            <div class="tabs">
                <button class="tab active" data-tab="live">Live Events</button>
                <button class="tab" data-tab="sessions">Sessions</button>
                <button class="tab" data-tab="detail">Node Detail</button>
            </div>
            
            <div class="tab-content active" id="tab-live">
                <div class="event-log" id="event-log">
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2" ry="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                        <span>Waiting for execution events...</span>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="tab-sessions">
                <div class="sessions-list" id="sessions-list">
                    <div class="empty-state">
                        <span>Loading sessions...</span>
                    </div>
                </div>
            </div>
            
            <div class="tab-content" id="tab-detail">
                <div class="node-detail" id="node-detail">
                    <div class="empty-state">
                        <span>Select a node to view details</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── State ───────────────────────────────────────────────
        let ws = null;
        let network = null;
        let nodes = new vis.DataSet([]);
        let edges = new vis.DataSet([]);
        let nodeData = {};      // node_id -> {agent_type, task, status, details}
        let eventCount = 0;
        let currentSessionId = null;
        
        const STATUS_COLORS = {
            pending: '#9ca3af',
            running: '#3b82f6',
            success: '#22c55e',
            failed: '#ef4444',
            skipped: '#f59e0b',
            retrying: '#a855f7',
        };
        
        const AGENT_ICONS = {
            planner: '📋',
            generator: '⚙️',
            evaluator: '🔍',
        };
        
        // ── WebSocket ───────────────────────────────────────────
        function connectWS() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
            
            ws.onopen = () => {
                document.getElementById('ws-status').classList.add('connected');
                document.getElementById('ws-status-text').textContent = 'Connected';
                ws.send(JSON.stringify({command: 'list_sessions'}));
            };
            
            ws.onclose = () => {
                document.getElementById('ws-status').classList.remove('connected');
                document.getElementById('ws-status-text').textContent = 'Disconnected';
                setTimeout(connectWS, 3000);
            };
            
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                handleMessage(msg);
            };
        }
        
        function handleMessage(msg) {
            switch (msg.type) {
                case 'history':
                    msg.events.forEach(evt => appendEvent(evt));
                    break;
                case 'execution_event':
                    appendEvent(msg);
                    updateNodeStatus(msg.node_id, msg.event_type);
                    break;
                case 'dag_update':
                    loadDAG(msg.dag);
                    break;
                case 'session_start':
                    currentSessionId = msg.session_id;
                    document.getElementById('session-info').style.display = 'flex';
                    document.getElementById('session-id').textContent = msg.session_id.substring(0, 8);
                    if (msg.dag) loadDAG(msg.dag);
                    break;
                case 'session_end':
                    showSessionEnd(msg.summary);
                    break;
                case 'sessions_list':
                    renderSessions(msg.sessions);
                    break;
                case 'session_data':
                    renderSessionData(msg);
                    break;
            }
        }
        
        // ── DAG Visualization ───────────────────────────────────
        function initGraph() {
            const container = document.getElementById('dag-graph');
            const data = { nodes, edges };
            const options = {
                layout: {
                    hierarchical: {
                        direction: 'LR',
                        sortMethod: 'directed',
                        levelSeparation: 180,
                        nodeSpacing: 120,
                    }
                },
                nodes: {
                    shape: 'box',
                    borderWidth: 2,
                    borderWidthSelected: 3,
                    font: {
                        face: '-apple-system, BlinkMacSystemFont, sans-serif',
                        size: 12,
                        color: '#f1f5f9',
                        multi: 'html',
                    },
                    color: {
                        background: '#334155',
                        border: '#475569',
                        highlight: { background: '#475569', border: '#6366f1' },
                    },
                    margin: { top: 10, bottom: 10, left: 14, right: 14 },
                    shadow: { enabled: true, color: 'rgba(0,0,0,0.3)', size: 6 },
                },
                edges: {
                    width: 2,
                    color: { color: '#475569', highlight: '#6366f1' },
                    arrows: { to: { enabled: true, scaleFactor: 0.8 } },
                    smooth: { type: 'cubicBezier', forceDirection: 'horizontal' },
                },
                physics: {
                    enabled: false,  // Use hierarchical layout
                },
                interaction: {
                    hover: true,
                    tooltipDelay: 200,
                },
            };
            
            network = new vis.Network(container, data, options);
            
            network.on('click', (params) => {
                if (params.nodes.length > 0) {
                    showNodeDetail(params.nodes[0]);
                }
            });
        }
        
        function loadDAG(dag) {
            if (!dag || !dag.nodes) return;
            
            nodeData = {};
            const newNodes = [];
            const newEdges = [];
            
            dag.nodes.forEach(node => {
                const nid = node.id;
                const agent = node.agent_type || 'unknown';
                const icon = AGENT_ICONS[agent] || '🤖';
                
                nodeData[nid] = {
                    agent_type: agent,
                    task: node.task || '',
                    status: 'pending',
                };
                
                newNodes.push({
                    id: nid,
                    label: `<b>${icon} ${nid}</b>\n<small>${agent}</small>`,
                    title: `${agent}: ${node.task || ''}`,
                    color: {
                        background: '#334155',
                        border: STATUS_COLORS.pending,
                    },
                });
            });
            
            if (dag.edges) {
                dag.edges.forEach((edge, idx) => {
                    newEdges.push({
                        id: `e${idx}`,
                        from: edge.from,
                        to: edge.to,
                    });
                });
            }
            
            nodes.clear();
            edges.clear();
            nodes.add(newNodes);
            edges.add(newEdges);
            
            updateStats();
            
            // Hide empty state
            const emptyState = document.getElementById('graph-empty');
            if (emptyState) emptyState.style.display = 'none';
            
            // Fit graph to viewport
            if (network) {
                network.fit({ animation: false });
                network.redraw();
            }
            
            // Clear event log and show ready state
            const log = document.getElementById('event-log');
            log.innerHTML = '';
        }
        
        function updateNodeStatus(nodeId, eventType) {
            if (!nodeData[nodeId]) return;
            
            let status = 'pending';
            if (eventType === 'started') status = 'running';
            else if (eventType === 'completed') status = 'success';
            else if (eventType === 'failed') status = 'failed';
            else if (eventType === 'skipped') status = 'skipped';
            else if (eventType === 'retrying') status = 'retrying';
            
            nodeData[nodeId].status = status;
            
            const color = STATUS_COLORS[status];
            nodes.update({
                id: nodeId,
                color: {
                    background: status === 'running' ? '#1e3a5f' : '#334155',
                    border: color,
                },
                font: {
                    color: status === 'running' ? '#93c5fd' : '#f1f5f9',
                },
            });
            
            // Pulse animation for running nodes
            if (status === 'running') {
                nodes.update({
                    id: nodeId,
                    shadow: { enabled: true, color: color, size: 15 },
                });
            } else {
                nodes.update({
                    id: nodeId,
                    shadow: { enabled: true, color: 'rgba(0,0,0,0.3)', size: 6 },
                });
            }
            
            updateStats();
        }
        
        function updateStats() {
            const counts = { pending: 0, running: 0, success: 0, failed: 0, skipped: 0, retrying: 0 };
            Object.values(nodeData).forEach(n => {
                counts[n.status] = (counts[n.status] || 0) + 1;
            });
            
            document.getElementById('stat-total').textContent = Object.keys(nodeData).length;
            document.getElementById('stat-success').textContent = counts.success;
            document.getElementById('stat-failed').textContent = counts.failed;
            document.getElementById('stat-running').textContent = counts.running;
        }
        
        // ── Event Log ───────────────────────────────────────────
        function appendEvent(evt) {
            eventCount++;
            const log = document.getElementById('event-log');
            
            // Remove empty state
            if (eventCount === 1) {
                log.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `event-item ${evt.event_type || evt.type || ''}`;
            
            const time = evt.timestamp ? new Date(evt.timestamp).toLocaleTimeString() : '';
            const details = evt.details || {};
            const detailText = Object.entries(details)
                .map(([k, v]) => `${k}: ${typeof v === 'string' && v.length > 50 ? v.substring(0, 50) + '...' : v}`)
                .join(', ');
            
            div.innerHTML = `
                <div class="event-header">
                    <span class="event-type" style="color: ${STATUS_COLORS[evt.event_type] || '#94a3b8'}">${evt.event_type || evt.type}</span>
                    <span class="event-time">${time}</span>
                </div>
                <div class="event-node">${evt.node_id || ''}</div>
                ${detailText ? `<div class="event-details">${detailText}</div>` : ''}
            `;
            
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            
            // Keep max 200 events
            while (log.children.length > 200) {
                log.removeChild(log.firstChild);
            }
        }
        
        // ── Node Detail ─────────────────────────────────────────
        function showNodeDetail(nodeId) {
            const data = nodeData[nodeId];
            if (!data) return;
            
            const panel = document.getElementById('node-detail');
            const color = STATUS_COLORS[data.status] || '#9ca3af';
            
            panel.innerHTML = `
                <h3>${AGENT_ICONS[data.agent_type] || '🤖'} ${nodeId}</h3>
                <div class="detail-row">
                    <span class="detail-label">Status</span>
                    <span class="detail-value" style="color:${color}">${data.status.toUpperCase()}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Agent Type</span>
                    <span class="detail-value">${data.agent_type}</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Task</span>
                    <span class="detail-value">${data.task || 'N/A'}</span>
                </div>
            `;
            
            // Switch to detail tab
            switchTab('detail');
        }
        
        // ── Sessions ────────────────────────────────────────────
        function renderSessions(sessions) {
            const list = document.getElementById('sessions-list');
            if (!sessions || sessions.length === 0) {
                list.innerHTML = '<div class="empty-state"><span>No sessions found</span></div>';
                return;
            }
            
            list.innerHTML = sessions.map(s => `
                <div class="session-item" onclick="loadSession('${s.session_id}')">
                    <div class="session-id">${s.session_id.substring(0, 16)}...</div>
                    <div class="session-meta">
                        ${s.created_at ? new Date(s.created_at).toLocaleString() : ''} · 
                        ${s.event_count} events · 
                        ${s.tool_calls} tool calls
                    </div>
                </div>
            `).join('');
        }
        
        async function loadSession(sessionId) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({command: 'get_session', session_id: sessionId}));
            } else {
                // HTTP fallback
                try {
                    const resp = await fetch(`/api/sessions/${sessionId}`);
                    const data = await resp.json();
                    renderSessionData(data);
                } catch (e) {
                    console.error('Failed to load session via HTTP:', e);
                }
            }
        }
        
        function renderSessionData(data) {
            if (data.dag) {
                loadDAG(data.dag);
            }
            
            // Replay events
            const log = document.getElementById('event-log');
            log.innerHTML = '';
            eventCount = 0;
            
            if (data.events) {
                data.events.forEach(evt => {
                    // Map session event types to display types
                    let eventType = 'completed';
                    let nodeId = '';
                    if (evt.type === 'session.status_start') {
                        eventType = 'started';
                        nodeId = 'SESSION';
                    } else if (evt.type === 'agent.message') {
                        eventType = evt.payload?.tool_calls ? 'started' : 'completed';
                        nodeId = 'AGENT';
                    } else if (evt.type === 'agent.tool_use') {
                        eventType = 'started';
                        nodeId = evt.payload?.name || 'TOOL';
                    } else if (evt.type === 'agent.tool_result') {
                        eventType = evt.payload?.success ? 'completed' : 'failed';
                        nodeId = 'TOOL';
                    } else if (evt.type === 'heartbeat_missed') {
                        eventType = 'retrying';
                        nodeId = evt.payload?.node_id || '';
                    } else if (evt.type === 'eval_result') {
                        eventType = evt.payload?.passed ? 'completed' : 'failed';
                        nodeId = 'EVAL';
                    } else if (evt.type && evt.type.includes('workflow.')) {
                        eventType = evt.type.includes('start') ? 'started' : 
                                   evt.type.includes('error') ? 'failed' : 'completed';
                        nodeId = evt.payload?.stage_name || '';
                    }
                    
                    appendEvent({
                        node_id: nodeId,
                        event_type: eventType,
                        timestamp: evt.timestamp,
                        details: evt.payload,
                    });
                });
            }
            
            currentSessionId = data.session_id;
            document.getElementById('session-info').style.display = 'flex';
            document.getElementById('session-id').textContent = data.session_id.substring(0, 8);
            switchTab('live');
        }
        
        function showSessionEnd(summary) {
            appendEvent({
                node_id: 'SYSTEM',
                event_type: 'completed',
                timestamp: new Date().toISOString(),
                details: summary,
            });
        }
        
        // ── Tabs ────────────────────────────────────────────────
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                switchTab(tab.dataset.tab);
            });
        });
        
        function switchTab(name) {
            document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === `tab-${name}`));
        }
        
        // ── Init ────────────────────────────────────────────────
        // HTTP fallback: load sessions via REST if WebSocket has no history
        async function loadSessionsViaHTTP() {
            try {
                const resp = await fetch('/api/sessions');
                const data = await resp.json();
                if (data.sessions && data.sessions.length > 0) {
                    renderSessions(data.sessions);
                }
            } catch (e) {
                console.error('Failed to load sessions via HTTP:', e);
            }
        }
        loadSessionsViaHTTP();
        initGraph();
        connectWS();
        switchTab('sessions');  // default to sessions tab so content is visible
    </script>
</body>
</html>
