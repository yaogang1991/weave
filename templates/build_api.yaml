name: build_api
description: Build a REST API endpoint with tests
version: "1.0"
category: backend
variables:
  feature: API endpoint
  language: Python
nodes:
  - id: planner_api
    agent_type: planner
    task_description: "Plan the implementation of {feature} in {language}. Define the API schema, routes, data models, and error handling."
  - id: generator_api
    agent_type: generator
    task_description: "Implement the {feature} in {language} following the plan. Include route handlers, data validation, and error responses."
  - id: generator_tests
    agent_type: generator
    task_description: "Write comprehensive tests for {feature}: unit tests, integration tests, and edge cases."
  - id: evaluator
    agent_type: evaluator
    task_description: "Evaluate the {feature} implementation: run tests, check code style, verify API contracts."
edges:
  - from: planner_api
    to: generator_api
  - from: generator_api
    to: generator_tests
  - from: generator_tests
    to: evaluator
reasoning_template: "Building {feature} in {language}: plan -> implement -> test -> evaluate"
